
[functions.categorize-recipe]
enabled = true
verify_jwt = true
import_map = "./functions/categorize-recipe/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/categorize-recipe/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/categorize-recipe/*.html" ]
[functions.process-banquets]
enabled = true
verify_jwt = false

[functions.process-beo]
enabled = true
verify_jwt = false